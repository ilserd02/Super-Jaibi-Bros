<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>Super Jaibi Bros</title>
    <link href="index.css" rel="stylesheet" />
    <link href="Theme/styles.css" rel="stylesheet" />
    <style>
        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Ajustamos el tamaño del contenedor principal sin romper los elementos internos */
        #game {
            width: 800px !important;
            height: 600px !important;
            position: relative;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
            overflow: hidden;
        }

        /* Oculta los controles e interfaz inferior */
        #controls {
            display: none !important;
        }
    </style>
</head>

<body>
    <section id="game"></section>
    <script src="index.js" type="text/javascript"></script>
</body>
</html>
